name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # ── Install backend dependencies (lockfile-driven) ──
      - name: Install dependencies (core, api, mcp)
        run: npm ci -w core -w api -w mcp

      # ── Install web-ui dependencies (--no-package-lock: root lockfile has macOS-only rollup binaries) ──
      - name: Install dependencies (web-ui)
        run: npm install -w web-ui --no-package-lock --no-audit --no-fund

      # ── Core build (must come first) ──
      - name: Build core
        run: npm run -w core build

      # ── Type checks ──
      - name: TypeScript check (API)
        run: npx tsc --noEmit
        working-directory: api

      - name: TypeScript check (MCP)
        run: npx tsc --noEmit
        working-directory: mcp

      - name: TypeScript & build check (Web UI)
        run: npm run build
        working-directory: web-ui

      # ── Lint checks ──
      - name: Lint (Core)
        run: npx eslint .
        working-directory: core

      - name: Lint (API)
        run: npx eslint .
        working-directory: api

      - name: Lint (MCP)
        run: npx eslint .
        working-directory: mcp

      - name: Lint (Web UI)
        run: npx eslint .
        working-directory: web-ui

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # ── Create .env.test for test-api container (Stripe test keys) ──
      - name: Create test env file
        run: |
          cat > tests/.env.test << 'EOF'
          STRIPE_SECRET_KEY=
          STRIPE_PRICE_ID_MONTHLY=
          STRIPE_PRICE_ID_ANNUAL=
          STRIPE_WEBHOOK_SECRET=
          EOF

      # ── Install test runner dependencies ──
      - name: Install test dependencies
        run: npm install --no-audit --no-fund
        working-directory: tests

      # ── Run integration tests (vitest handles docker compose up/down) ──
      - name: Run integration tests
        run: npx vitest run --config vitest.config.ts
        working-directory: tests

      # ── Ensure containers are torn down even on failure ──
      - name: Cleanup test containers
        if: always()
        run: docker compose -f docker-compose.test.yml down --volumes --remove-orphans 2>/dev/null || true
        working-directory: tests

  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            cd /opt/learnforge &&
            GIT_SSH_COMMAND="ssh -i /home/github_deploy/.ssh/github_learnforge_access -o StrictHostKeyChecking=no" git pull origin main &&
            sudo docker compose -f docker-compose.prod.yml down &&
            sudo docker compose -f docker-compose.prod.yml up --build -d
          '
