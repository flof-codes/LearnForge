services:
  test-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: learnforge_test
      POSTGRES_PASSWORD: learnforge_test
      POSTGRES_DB: learnforge_test
    ports:
      - "5555:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnforge_test"]
      interval: 2s
      timeout: 2s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data

  test-api:
    build: ../api
    mem_limit: 4g
    ports:
      - "4444:3000"
    env_file:
      - .env.test
    environment:
      DATABASE_URL: postgresql://learnforge_test:learnforge_test@test-db:5432/learnforge_test
      PORT: "3000"
      IMAGE_PATH: /data/images
      JWT_SECRET: test-jwt-secret
      JWT_EXPIRES_IN: "1h"
      APP_URL: http://localhost:4444
    volumes:
      - test-images:/data/images
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\""]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 10s
    depends_on:
      test-db:
        condition: service_healthy

  test-mcp:
    build: ../mcp
    mem_limit: 4g
    ports:
      - "4445:3001"
    environment:
      DATABASE_URL: postgresql://learnforge_test:learnforge_test@test-db:5432/learnforge_test
      PORT: "3001"
      IMAGE_PATH: /data/images
    volumes:
      - test-images:/data/images
    depends_on:
      test-db:
        condition: service_healthy
      test-api:
        condition: service_healthy

volumes:
  test-images:
