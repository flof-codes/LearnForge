services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: learnforge
      POSTGRES_PASSWORD: learnforge
      POSTGRES_DB: learnforge
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@learnforge.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./api
    ports:
      - "3333:3000"
    environment:
      DATABASE_URL: postgresql://learnforge:learnforge@db:5432/learnforge
      PORT: "3000"
      IMAGE_PATH: /data/images
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      JWT_EXPIRES_IN: "7d"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_PRICE_ID_MONTHLY: "${STRIPE_PRICE_ID_MONTHLY:-}"
      STRIPE_PRICE_ID_ANNUAL: "${STRIPE_PRICE_ID_ANNUAL:-}"
      APP_URL: "${APP_URL:-http://localhost:5173}"
    volumes:
      - ./data/images:/data/images
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3333
        VITE_DONATION_URL: "${VITE_DONATION_URL:-}"
        OPERATOR_NAME: "${OPERATOR_NAME:-LearnForge}"
        OPERATOR_ADDRESS: "${OPERATOR_ADDRESS:-}"
        OPERATOR_CITY: "${OPERATOR_CITY:-Austria}"
        OPERATOR_EMAIL: "${OPERATOR_EMAIL:-office@learnforge.eu}"
    ports:
      - "5173:3000"
    depends_on:
      - api
    restart: unless-stopped

  mcp:
    build: ./mcp
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://learnforge:learnforge@db:5432/learnforge
      PORT: "3001"
      IMAGE_PATH: /data/images
      MCP_PUBLIC_URL: "http://localhost:3001"
    volumes:
      - ./data/images:/data/images
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
    name: learnforge_pg_data
