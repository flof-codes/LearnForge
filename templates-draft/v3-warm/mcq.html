<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/picocss/2.1.1/pico.classless.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap">
<style>
  :root{--pico-font-family:'Inter',sans-serif;--pico-font-size:93.75%}
  html,body{margin:0;padding:0;background:transparent}
  body>main{margin:0;padding:0;max-width:none}
  [data-bloom]{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.72em;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  [data-bloom="0"]{background:#fef3c7;color:#92400e}
  [data-bloom="1"]{background:#ccfbf1;color:#115e59}
  [data-bloom="2"]{background:#e0e7ff;color:#3730a3}
  [data-bloom="3"]{background:#fce7f3;color:#9d174d}
  [data-bloom="4"]{background:#ede9fe;color:#5b21b6}
  [data-bloom="5"]{background:#fae8ff;color:#86198f}
  blockquote{border-left-color:#d97706}
  fieldset{border:none;padding:0;margin:0 0 8px}
  fieldset label{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;border:1px solid var(--pico-muted-border-color);margin:6px 0;cursor:pointer;transition:all .15s;width:100% !important;max-width:100% !important}
  fieldset label:hover{border-color:#d97706;background:rgba(217,119,6,.08)}
  fieldset label.correct{border-color:#0d9488;background:rgba(13,148,136,.12)}
  fieldset label.wrong{border-color:#e11d48;background:rgba(225,29,72,.12)}
  fieldset label.missed{border-color:#d97706;background:rgba(217,119,6,.12);opacity:.7}
  fieldset label.disabled{pointer-events:none}
  button{background:#d97706 !important;border-color:#d97706 !important}
  button:hover{background:#b45309 !important}
  .fb{margin-top:12px;padding:12px 14px;border-radius:12px;font-size:.9em;display:none}
  .fb.perfect{display:block;background:rgba(13,148,136,.12);border:1px solid #0d9488}
  .fb.partial{display:block;background:rgba(217,119,6,.12);border:1px solid #d97706}
  .fb.fail{display:block;background:rgba(225,29,72,.12);border:1px solid #e11d48}
</style>
</head><body><main>
<article>
  <span data-bloom="1">Remember</span>
  <blockquote>In Python, data structures have different performance characteristics for common operations.</blockquote>
  <p>Which of the following have <strong>O(1)</strong> average-case lookup time?</p>
  <small>Select all that apply</small>
  <fieldset id="opts">
    <label><input type="checkbox" data-correct="false"> List</label>
    <label><input type="checkbox" data-correct="true"> Dictionary</label>
    <label><input type="checkbox" data-correct="true"> Set</label>
    <label><input type="checkbox" data-correct="false"> Tuple</label>
  </fieldset>
  <button onclick="lfCheck()">Check Answers</button>
  <div class="fb" id="fb"></div>
</article>
<script>
function lfCheck(){const labels=document.querySelectorAll('#opts label');const btn=document.querySelector('button');btn.disabled=true;btn.textContent='Checked';let correct=0,total=0,wrong=0;labels.forEach(l=>{l.classList.add('disabled');const cb=l.querySelector('input');cb.disabled=true;const isC=cb.dataset.correct==='true';const isS=cb.checked;if(isC)total++;if(isC&&isS){l.classList.add('correct');correct++}else if(isC&&!isS){l.classList.add('missed')}else if(!isC&&isS){l.classList.add('wrong');wrong++}});const fb=document.getElementById('fb');if(correct===total&&wrong===0){fb.className='fb perfect';fb.textContent='Both dict and set use hash tables \u2014 O(1) average lookup!'}else if(correct>0){fb.className='fb partial';fb.textContent=correct+' of '+total+' correct. Flip the card for explanations.'}else{fb.className='fb fail';fb.textContent='None correct. Flip the card for explanations.'}}
</script>
<script>(function(){function p(){parent.postMessage({type:'lf-resize',height:document.documentElement.scrollHeight},'*')}new ResizeObserver(p).observe(document.documentElement);p()})()</script>
</main></body></html>
